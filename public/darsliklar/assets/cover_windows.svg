<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1524" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="320" height="200" rx="16" fill="url(#bgGrad)" />
  <rect width="318" height="198" x="1" y="1" rx="15" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Topic Graphic Art -->
  
            <g transform="translate(130, 60)">
                <path d="M0,0 L45,6 L45,45 L0,45 Z" fill="#06b6d4"/>
                <path d="M52,6 L100,0 L100,45 L52,45 Z" fill="#06b6d4"/>
                <path d="M0,52 L45,52 L45,92 L0,98 Z" fill="#10b981"/>
                <path d="M52,52 L100,52 L100,98 L52,92 Z" fill="#10b981"/>
            </g>
        
  
  <!-- Subtle Gradient Overlay -->
  <rect width="320" height="200" fill="none" opacity="0.1" stroke="#ffffff" stroke-width="1"/>
</svg>