<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="320" height="200" rx="16" fill="url(#bgGrad)" />
  <rect width="318" height="198" x="1" y="1" rx="15" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Topic Graphic Art -->
  
            <rect x="60" y="70" width="50" height="60" rx="8" fill="#2563eb"/>
            <text x="77" y="107" fill="#fff" font-weight="bold" font-size="22">W</text>
            <rect x="125" y="70" width="50" height="60" rx="8" fill="#16a34a"/>
            <text x="142" y="107" fill="#fff" font-weight="bold" font-size="22">X</text>
            <rect x="190" y="70" width="50" height="60" rx="8" fill="#ea580c"/>
            <text x="207" y="107" fill="#fff" font-weight="bold" font-size="22">P</text>
        
  
  <!-- Subtle Gradient Overlay -->
  <rect width="320" height="200" fill="none" opacity="0.1" stroke="#ffffff" stroke-width="1"/>
</svg>