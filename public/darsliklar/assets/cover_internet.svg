<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="320" height="200" rx="16" fill="url(#bgGrad)" />
  <rect width="318" height="198" x="1" y="1" rx="15" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Topic Graphic Art -->
  
            <path d="M110,140 A70,70 0 0,1 210,140 M125,120 A50,50 0 0,1 195,120 M140,100 A30,30 0 0,1 180,100" stroke="#06b6d4" stroke-width="4" fill="none" stroke-linecap="round"/>
            <circle cx="160" cy="150" r="8" fill="#10b981"/>
        
  
  <!-- Subtle Gradient Overlay -->
  <rect width="320" height="200" fill="none" opacity="0.1" stroke="#ffffff" stroke-width="1"/>
</svg>