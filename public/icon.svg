<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0f172a"/>
  
  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>

  <!-- Medical cross / journal icon -->
  <!-- Vertical bar -->
  <rect x="27" y="14" width="10" height="36" rx="3" fill="#3b82f6"/>
  <!-- Horizontal bar -->
  <rect x="14" y="27" width="36" height="10" rx="3" fill="#3b82f6"/>

  <!-- Inner highlight -->
  <rect x="27" y="14" width="10" height="36" rx="3" fill="url(#vgrad)" opacity="0.6"/>
  <rect x="14" y="27" width="36" height="10" rx="3" fill="url(#hgrad)" opacity="0.3"/>

  <defs>
    <linearGradient id="vgrad" x1="32" y1="14" x2="32" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="hgrad" x1="14" y1="32" x2="50" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
</svg>
